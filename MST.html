<!DOCTYPE html>
<html>
<head>
  <title>My Portfolio</title>
  <style>
    body {
      background-color: #f0f4f8;
      text-align: center;
      font-family: Arial, sans-serif;
      margin: 0;
    }

    header {
      background: linear-gradient(to right, #60a5e1, #868787);
      color: white;
      padding: 30px;
    }

    section {
      background-color: white;
      margin: 20px auto;
      padding: 20px;
      width: 80%;
      border-radius: 12px;
      box-shadow: 0 4px 8px gray;
    }

    h1, h2 {
      margin-bottom: 10px;
    }

    a {
      text-decoration: none;
    }

    button {
      background-color: #5944cb;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background-color: #486182;
    }

    @media (max-width: 600px) {
      section {
        width: 90%;
      }

      header {
        padding: 20px;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>My Portfolio</h1>
    <p>Hello, I am Khusbu Kewat</p>
  </header>

  <section>
    <h2>About Me</h2>
    <p>I am learning web development and creating simple websites.</p>
  </section>

  <section>
    <h2>Skills</h2>
    <p>HTML, CSS, JavaScript</p>
  </section>

  <section>
    <h2>Projects</h2>
    <p>Portfolio Website</p>
    <p>Student Record System</p>
  </section>

  <section>
    <h2>Resume</h2>
    <p>Click below to view my resume</p>
    <a href="resume.pdf" target="_blank">
      <button>View Resume</button>
    </a>
  </section>

</body>
</html>
